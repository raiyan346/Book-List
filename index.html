<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book_way</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="display-4 my-4">
                Book Way
            </h1>
            <button class="btn btn-dark" id="clear-task">
                Clear All
            </button>
        </div>

        <div class="show-alert"></div>


        <form id="book-form">
            <div class="form-floating mb-4">
                <input type="text" class="form-control" id="title" placeholder="Add title for your book" value="test">
                <label for="title">Title</label>
            </div>
            <div class="form-floating mb-4">
                <input type="text" class="form-control" id="author" placeholder="Add title for your book" value="test">
                <label for="auhtor">Author</label>
            </div>
            <div class="form-floating mb-4">
                <input type="number" class="form-control" id="isbn" placeholder="Add title for your book" value="123">
                <label for="isbn">isbn</label>
            </div>
 
            <button type="submit" class="btn btn-dark mb-4">
                Add Book
            </button>
        </form>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author_Name</th>
                    <th>isbn</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="book-list">
               
            </tbody>
        </table>
    </div>
    <script src="./es6.js"></script>
</body>
</html>
